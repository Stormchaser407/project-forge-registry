projects:
  - slug: example_project
    name: Example Project
    status: review
    classification: unknown
    category: unknown
    local_path: /mnt/storage/Cole/Projects/example_project
    canonical_path: null
    paths:
      workspace: /home/cole/.config/Code/User/workspaces/example_project.code-workspace
      obsidian: /home/cole/main_vault/10 Projects/example_project
    registry_action: register_full
    launch:
      command: code-example_project
    git:
      default_branch: main
      github: null
      codeberg: null
      mirror_mode: dual_push
    sync:
      obsidian_to_repo: export_only
      repo_to_obsidian: docs_only
      allow_code_to_obsidian: false
      allow_secrets: false
